syntax="proto3";

package imrpc;

option go_package = "github.com/longhorn/types/pkg/generated/imrpc";

// Deprecated: Use DataEngine instead.
enum BackendStoreDriver {
    v1 = 0;
    v2 = 1;
}

enum DataEngine {
    DATA_ENGINE_V1 = 0;
    DATA_ENGINE_V2 = 1;
}

enum CloneMode {
    // Full copy; new volume is independent of the source.
    CLONE_MODE_FULL_COPY     = 0; // aka "full-copy"
    // Snapshot-based; fast and space-efficient but depends on the source.
    CLONE_MODE_LINKED_CLONE = 1; // aka "linked-clone"
}

// DataLayoutType is the top-level storage topology selector forwarded from
// InstanceCreateRequest to spdkrpc.EngineCreateRequest. Mirrors
// spdkrpc.DataLayoutType but defined here to keep imrpc and spdkrpc decoupled.
enum DataLayoutType {
    DATA_LAYOUT_TYPE_REPLICATED = 0;
    DATA_LAYOUT_TYPE_SHARDED    = 1;
}
